name: Build Zygisk Module

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (optional, auto if empty)"
        required: false
        type: string
  push:
    paths:
      - "module/**"
      - "META-INF/**"
      - "customize.sh"
      - "config.prop"
      - ".github/workflows/build-zygisk.yml"
      - "module.prop"
      - "build_zygisk_module.ps1"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "ndk;26.3.11579264"

      - name: Build zygisk libraries
        run: |
          export NDK="$ANDROID_SDK_ROOT/ndk/26.3.11579264"
          cd module/jni
          "$NDK/ndk-build" NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=Android.mk NDK_APPLICATION_MK=Application.mk -j4
          ls -lah libs/arm64-v8a
          ls -lah libs/armeabi-v7a
          ls -lah libs/x86_64
          ls -lah libs/x86

      - name: Package magisk module zip
        run: |
          mkdir -p out/stage/zygisk
          mkdir -p out/stage/META-INF
          cp module.prop out/stage/module.prop
          cp customize.sh out/stage/customize.sh
          cp config.prop out/stage/config.prop
          cp -r META-INF/com out/stage/META-INF/com
          cp module/jni/libs/arm64-v8a/libhsahc_zygisk.so out/stage/zygisk/arm64-v8a.so
          cp module/jni/libs/armeabi-v7a/libhsahc_zygisk.so out/stage/zygisk/armeabi-v7a.so
          cp module/jni/libs/x86_64/libhsahc_zygisk.so out/stage/zygisk/x86_64.so
          cp module/jni/libs/x86/libhsahc_zygisk.so out/stage/zygisk/x86.so
          chmod 0755 out/stage/META-INF/com/google/android/update-binary
          chmod 0755 out/stage/customize.sh
          test -f out/stage/META-INF/com/google/android/update-binary
          test -f out/stage/META-INF/com/google/android/updater-script
          cd out/stage
          zip -r -9 ../hsahc_forceupdate_zygisk_module.zip ./*
          cd ..
          cp hsahc_forceupdate_zygisk_module.zip INSTALL_ME_hsahc_forceupdate_zygisk_module.zip
          unzip -l hsahc_forceupdate_zygisk_module.zip | grep -q "module.prop"
          unzip -l hsahc_forceupdate_zygisk_module.zip | grep -q "config.prop"
          unzip -l hsahc_forceupdate_zygisk_module.zip | grep -q "META-INF/com/google/android/update-binary"
          unzip -l hsahc_forceupdate_zygisk_module.zip | grep -q "META-INF/com/google/android/updater-script"
          unzip -l hsahc_forceupdate_zygisk_module.zip | grep -q "zygisk/arm64-v8a.so"
          unzip -l hsahc_forceupdate_zygisk_module.zip | grep -q "zygisk/armeabi-v7a.so"
          unzip -l hsahc_forceupdate_zygisk_module.zip | grep -q "zygisk/x86_64.so"
          unzip -l hsahc_forceupdate_zygisk_module.zip | grep -q "zygisk/x86.so"
          ls -lah
          sha256sum hsahc_forceupdate_zygisk_module.zip INSTALL_ME_hsahc_forceupdate_zygisk_module.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Setup release metadata
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
            if [ -z "${TAG}" ]; then
              TAG="zygisk-manual-${GITHUB_RUN_NUMBER}"
            fi
          else
            TAG="zygisk-auto-${GITHUB_RUN_NUMBER}"
          fi
          echo "RELEASE_TAG=${TAG}" >> "${GITHUB_ENV}"
          echo "RELEASE_NAME=HSAHC Zygisk ${TAG}" >> "${GITHUB_ENV}"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          body: |
            安装请只下载：
            - INSTALL_ME_hsahc_forceupdate_zygisk_module.zip

            不要下载：
            - Source code (zip)
            - Source code (tar.gz)
          files: |
            out/hsahc_forceupdate_zygisk_module.zip
            out/INSTALL_ME_hsahc_forceupdate_zygisk_module.zip
            out/SHA256SUMS.txt
