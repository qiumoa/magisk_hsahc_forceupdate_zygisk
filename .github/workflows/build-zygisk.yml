name: Build Static Mount Module

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (optional, auto if empty)"
        required: false
        type: string
  push:
    paths:
      - "files/**"
      - "META-INF/**"
      - "customize.sh"
      - "post-fs-data.sh"
      - "service.sh"
      - "config.prop"
      - ".github/workflows/build-zygisk.yml"
      - "module.prop"
      - "build_zygisk_module.ps1"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package magisk module zip
        run: |
          mkdir -p out/stage/files
          mkdir -p out/stage/META-INF
          cp module.prop out/stage/module.prop
          cp customize.sh out/stage/customize.sh
          cp post-fs-data.sh out/stage/post-fs-data.sh
          cp service.sh out/stage/service.sh
          cp config.prop out/stage/config.prop
          cp -r META-INF/com out/stage/META-INF/com
          cp files/libil2cpp_arm64_patched.so out/stage/files/libil2cpp_arm64_patched.so
          chmod 0755 out/stage/META-INF/com/google/android/update-binary
          chmod 0755 out/stage/customize.sh
          chmod 0755 out/stage/post-fs-data.sh
          chmod 0755 out/stage/service.sh
          test -f out/stage/META-INF/com/google/android/update-binary
          test -f out/stage/META-INF/com/google/android/updater-script
          test -f out/stage/post-fs-data.sh
          test -f out/stage/service.sh
          test -f out/stage/files/libil2cpp_arm64_patched.so
          cd out/stage
          zip -r -9 ../hsahc_forceupdate_zygisk_module.zip ./*
          cd ..
          cp hsahc_forceupdate_zygisk_module.zip INSTALL_ME_hsahc_forceupdate_zygisk_module.zip
          unzip -l hsahc_forceupdate_zygisk_module.zip | grep -q "module.prop"
          unzip -l hsahc_forceupdate_zygisk_module.zip | grep -q "config.prop"
          unzip -l hsahc_forceupdate_zygisk_module.zip | grep -q "META-INF/com/google/android/update-binary"
          unzip -l hsahc_forceupdate_zygisk_module.zip | grep -q "META-INF/com/google/android/updater-script"
          unzip -l hsahc_forceupdate_zygisk_module.zip | grep -q "post-fs-data.sh"
          unzip -l hsahc_forceupdate_zygisk_module.zip | grep -q "service.sh"
          unzip -l hsahc_forceupdate_zygisk_module.zip | grep -q "files/libil2cpp_arm64_patched.so"
          ls -lah
          sha256sum hsahc_forceupdate_zygisk_module.zip INSTALL_ME_hsahc_forceupdate_zygisk_module.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Setup release metadata
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
            if [ -z "${TAG}" ]; then
              TAG="static-manual-${GITHUB_RUN_NUMBER}"
            fi
          else
            TAG="static-auto-${GITHUB_RUN_NUMBER}"
          fi
          echo "RELEASE_TAG=${TAG}" >> "${GITHUB_ENV}"
          echo "RELEASE_NAME=HSAHC Static Mount ${TAG}" >> "${GITHUB_ENV}"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          body: |
            Install this file:
            - INSTALL_ME_hsahc_forceupdate_zygisk_module.zip

            Do not install:
            - Source code (zip)
            - Source code (tar.gz)
          files: |
            out/hsahc_forceupdate_zygisk_module.zip
            out/INSTALL_ME_hsahc_forceupdate_zygisk_module.zip
            out/SHA256SUMS.txt
