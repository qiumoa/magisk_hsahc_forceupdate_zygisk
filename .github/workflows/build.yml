name: Build Magisk Module

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build Module
      run: |
        VERSION=$(grep '^version=' module.prop | cut -d'=' -f2)
        MODULE_ID=$(grep '^id=' module.prop | cut -d'=' -f2)
        OUT_DIR="out"
        ZIP_NAME="${MODULE_ID}_${VERSION}.zip"
        INSTALL_ZIP="INSTALL_ME_${MODULE_ID}_${VERSION}.zip"

        mkdir -p "$OUT_DIR/module/META-INF/com/google/android"

        cp module.prop service.sh post-fs-data.sh customize.sh config.prop "$OUT_DIR/module/"
        cp -r files "$OUT_DIR/module/"

        cat > "$OUT_DIR/module/META-INF/com/google/android/update-binary" << 'EOF'
        #!/sbin/sh
        OUTFD=$2
        ZIPFILE=$3

        ui_print() {
          echo "ui_print $1" > /proc/self/fd/$OUTFD
          echo "ui_print" > /proc/self/fd/$OUTFD
        }

        unzip -o "$ZIPFILE" 'customize.sh' -d /tmp >&2
        if [ -f /tmp/customize.sh ]; then
          . /tmp/customize.sh
        fi
        EOF

        echo "#MAGISK" > "$OUT_DIR/module/META-INF/com/google/android/updater-script"

        cd "$OUT_DIR/module"
        zip -r "../$ZIP_NAME" . -x "*.git*"
        cd ../..

        cp "$OUT_DIR/$ZIP_NAME" "$OUT_DIR/$INSTALL_ZIP"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: magisk-module
        path: out/INSTALL_ME_*.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: out/INSTALL_ME_*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
